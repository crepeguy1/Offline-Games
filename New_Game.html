<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reaction Time Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      margin-top: 80px;
    }
    #box {
      width: 200px;
      height: 200px;
      background: red;
      margin: 40px auto;
      display: none;
      border-radius: 12px;
    }
    button {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #00aaff;
      color: white;
    }
  </style>
</head>
<body>

  <h1>Reaction Time Test</h1>
  <p>Tap the box as fast as you can when it appears.</p>

  <button onclick="startGame()">Start</button>

  <div id="box" onclick="boxClicked()"></div>

  <h2 id="result"></h2>

  <script>
    let startTime;

    function randomDelay() {
      return Math.random() * 2000 + 1000; // 1–3 seconds
    }

    function startGame() {
      document.getElementById("result").textContent = "";
      document.getElementById("box").style.display = "none";

      setTimeout(() => {
        startTime = Date.now();
        document.getElementById("box").style.display = "block";
      }, randomDelay());
    }

    function boxClicked() {
      let reaction = Date.now() - startTime;
      document.getElementById("result").textContent =
        "Your reaction time: " + reaction + " ms";
      document.getElementById("box").style.display = "none";
    }
  </script>

</body>
</html>
