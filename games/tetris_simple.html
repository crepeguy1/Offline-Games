<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris (Simple)</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 10px;
      min-min-height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #333;
    }
    #gameBoard {
      display: grid;
      grid-template-columns: repeat(10, 20px);
      grid-template-rows: repeat(20, 20px);
      gap: 1px;
      background-color: #333;
      padding: 10px;
      margin: 20px auto;
      width: 220px;
      height: 420px;
    }
    .cell {
      width: 20px;
      height: 20px;
      background-color: #fff;
    }
    .filled {
      background-color: #4CAF50;
    }
    .score {
      font-size: 24px;
      margin: 20px;
    }
    button {
      padding: clamp(10px, 2vw, 18px);
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
          min-height: 44px;
      min-width: 44px;
      cursor: pointer;}
    button:hover {
      background-color: #45a049;
    }
    .controls {
      margin: 20px;
      font-size: 18px;
    }
    #nextPiece {
      display: inline-block;
      margin-left: 50px;
      vertical-align: top;
    }
    #nextPiece div {
      display: grid;
      grid-template-columns: repeat(4, 15px);
      grid-template-rows: repeat(4, 15px);
      gap: 1px;
      background-color: #333;
      padding: 5px;
      width: 70px;
      height: 70px;
    }
    #nextPiece .cell {
      width: 15px;
      height: 15px;
    }
  
    @media (max-width: 480px) {
      body { padding: 8px; }
    }
  

  .navigation {
    margin-top: 30px;
    text-align: center;
  }
  .back-btn {
    background: #4caf50 !important;
    color: white !important;
    border: none !important;
    padding: clamp(12px, 3vw, 20px) !important;
    border-radius: 8px !important;
    font-size: clamp(1rem, 3vw, 1.4rem) !important;
    min-height: 48px !important;
    cursor: pointer !important;
    transition: background 0.2s !important;
    font-weight: bold !important;
  }
  .back-btn:hover {
    background: #45a049 !important;
  }</style>
</head>
<body>
  <h1>Tetris (Simple)</h1>
  <div class="score">Score: <span id="score">0</span> | Lines: <span id="lines">0</span></div>
  <div id="gameBoard"></div>
  <div id="nextPiece">
    <div>Next:</div>
    <div id="nextGrid"></div>
  </div>
  <div class="controls">
    Arrow keys: Move/rotate<br>
    <button onclick="movePiece('left')">←</button>
    <button onclick="movePiece('down')">↓</button>
    <button onclick="movePiece('right')">→</button>
    <button onclick="rotatePiece()">Rotate</button>
  </div>
<div class="navigation">
  <button onclick="window.location.href='../index.html'" class="back-btn">🏠 Back to Game Hub</button>
</div>
  <button onclick="resetGame()">Restart</button>

  <script>
    const boardWidth = 10;
    const boardHeight = 20;
    const gameBoard = document.getElementById('gameBoard');
    const nextGrid = document.getElementById('nextGrid');
    const scoreElement = document.getElementById('score');
    const linesElement = document.getElementById('lines');

    let board = Array(boardHeight).fill().map(() => Array(boardWidth).fill(0));
    let currentPiece = null;
    let currentX = 0;
    let currentY = 0;
    let score = 0;
    let lines = 0;
    let gameRunning = true;
    let nextPiece = null;

    const pieces = [
      [[1, 1, 1, 1]], // I
      [[1, 1], [1, 1]], // O
      [[1, 0, 0], [1, 1, 1]], // J
      [[0, 0, 1], [1, 1, 1]], // L
      [[0, 1, 1], [1, 1, 0]], // S
      [[1, 1, 0], [0, 1, 1]], // Z
      [[0, 1, 0], [1, 1, 1]]  // T
    ];

    function createBoard() {
      gameBoard.innerHTML = '';
      nextGrid.innerHTML = '';
      for (let y = 0; y < boardHeight; y++) {
        for (let x = 0; x < boardWidth; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.id = `cell-${x}-${y}`;
          gameBoard.appendChild(cell);
        }
      }
      for (let y = 0; y < 4; y++) {
        for (let x = 0; x < 4; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.id = `next-${x}-${y}`;
          nextGrid.appendChild(cell);
        }
      }
    }

    function updateBoard() {
      for (let y = 0; y < boardHeight; y++) {
        for (let x = 0; x < boardWidth; x++) {
          const cell = document.getElementById(`cell-${x}-${y}`);
          cell.className = board[y][x] ? 'cell filled' : 'cell';
        }
      }

      // Draw current piece
      if (currentPiece) {
        for (let y = 0; y < currentPiece.length; y++) {
          for (let x = 0; x < currentPiece[y].length; x++) {
            if (currentPiece[y][x]) {
              const boardX = currentX + x;
              const boardY = currentY + y;
              if (boardX >= 0 && boardX < boardWidth && boardY >= 0 && boardY < boardHeight) {
                const cell = document.getElementById(`cell-${boardX}-${boardY}`);
                if (cell) cell.classList.add('filled');
              }
            }
          }
        }
      }

      // Draw next piece
      for (let y = 0; y < 4; y++) {
        for (let x = 0; x < 4; x++) {
          const cell = document.getElementById(`next-${x}-${y}`);
          cell.className = 'cell';
        }
      }
      if (nextPiece) {
        for (let y = 0; y < nextPiece.length; y++) {
          for (let x = 0; x < nextPiece[y].length; x++) {
            if (nextPiece[y][x]) {
              const cell = document.getElementById(`next-${x}-${y}`);
              if (cell) cell.classList.add('filled');
            }
          }
        }
      }
    }

    function generatePiece() {
      if (!nextPiece) {
        nextPiece = pieces[Math.floor(Math.random() * pieces.length)];
      }
      currentPiece = nextPiece;
      nextPiece = pieces[Math.floor(Math.random() * pieces.length)];
      currentX = Math.floor(boardWidth / 2) - 1;
      currentY = 0;
    }

    function movePiece(direction) {
      if (!gameRunning || !currentPiece) return;

      let newX = currentX;
      let newY = currentY;

      switch(direction) {
        case 'left': newX--; break;
        case 'right': newX++; break;
        case 'down': newY++; break;
      }

      if (canPlace(currentPiece, newX, newY)) {
        currentX = newX;
        currentY = newY;
        updateBoard();
        return true;
      }
      return false;
    }

    function rotatePiece() {
      if (!gameRunning || !currentPiece) return;

      const rotated = currentPiece[0].map((_, index) =>
        currentPiece.map(row => row[index]).reverse()
      );

      if (canPlace(rotated, currentX, currentY)) {
        currentPiece = rotated;
        updateBoard();
      }
    }

    function canPlace(piece, x, y) {
      for (let py = 0; py < piece.length; py++) {
        for (let px = 0; px < piece[py].length; px++) {
          if (piece[py][px]) {
            const boardX = x + px;
            const boardY = y + py;
            if (boardX < 0 || boardX >= boardWidth || boardY >= boardHeight ||
                (boardY >= 0 && board[boardY][boardX])) {
              return false;
            }
          }
        }
      }
      return true;
    }

    function placePiece() {
      for (let y = 0; y < currentPiece.length; y++) {
        for (let x = 0; x < currentPiece[y].length; x++) {
          if (currentPiece[y][x]) {
            const boardX = currentX + x;
            const boardY = currentY + y;
            if (boardY >= 0) {
              board[boardY][boardX] = 1;
            }
          }
        }
      }
    }

    function clearLines() {
      for (let y = boardHeight - 1; y >= 0; y--) {
        if (board[y].every(cell => cell)) {
          board.splice(y, 1);
          board.unshift(Array(boardWidth).fill(0));
          lines++;
          linesElement.textContent = lines;
          score += 100;
          scoreElement.textContent = score;
          y++; // Check the same line again
        }
      }
    }

    function gameLoop() {
      if (!gameRunning) return;

      if (!movePiece('down')) {
        placePiece();
        clearLines();
        generatePiece();

        if (!canPlace(currentPiece, currentX, currentY)) {
          gameOver();
          return;
        }
      }

      updateBoard();
      setTimeout(gameLoop, 500);
    }

    function gameOver() {
      gameRunning = false;
      alert(`Game Over! Score: ${score}, Lines: ${lines}`);
    }

    function resetGame() {
      board = Array(boardHeight).fill().map(() => Array(boardWidth).fill(0));
      currentPiece = null;
      score = 0;
      lines = 0;
      scoreElement.textContent = score;
      linesElement.textContent = lines;
      gameRunning = true;
      nextPiece = null;
      generatePiece();
      updateBoard();
      gameLoop();
    }

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowLeft': movePiece('left'); break;
        case 'ArrowDown': movePiece('down'); break;
        case 'ArrowRight': movePiece('right'); break;
        case 'ArrowUp': rotatePiece(); break;
      }
    });

    createBoard();
    generatePiece();
    updateBoard();
    gameLoop();
  </script>
</body>
</html>
