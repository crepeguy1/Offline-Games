<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pong (Simple)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #333;
    }
    #gameArea {
      position: relative;
      width: 600px;
      height: 400px;
      background-color: #000;
      margin: 20px auto;
      border: 2px solid #333;
      overflow: hidden;
    }
    #ball {
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: #fff;
      border-radius: 50%;
      top: 190px;
      left: 290px;
    }
    #paddle1 {
      position: absolute;
      width: 10px;
      height: 80px;
      background-color: #4CAF50;
      left: 10px;
      top: 160px;
    }
    #paddle2 {
      position: absolute;
      width: 10px;
      height: 80px;
      background-color: #f44336;
      right: 10px;
      top: 160px;
    }
    .score {
      font-size: 24px;
      margin: 20px;
      color: #333;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background-color: #45a049;
    }
    .controls {
      margin: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Pong (Simple)</h1>
  <div class="score">
    Player 1: <span id="score1">0</span> | Player 2: <span id="score2">0</span>
  </div>
  <div id="gameArea">
    <div id="ball"></div>
    <div id="paddle1"></div>
    <div id="paddle2"></div>
  </div>
  <div class="controls">
    Player 1: W/S keys<br>
    Player 2: ↑/↓ keys<br>
    <button onclick="movePaddle(1, -20)">W (P1 Up)</button>
    <button onclick="movePaddle(1, 20)">S (P1 Down)</button>
    <button onclick="movePaddle(2, -20)">↑ (P2 Up)</button>
    <button onclick="movePaddle(2, 20)">↓ (P2 Down)</button>
  </div>
  <button onclick="resetGame()">Restart</button>

  <script>
    const gameArea = document.getElementById('gameArea');
    const ball = document.getElementById('ball');
    const paddle1 = document.getElementById('paddle1');
    const paddle2 = document.getElementById('paddle2');
    const score1Element = document.getElementById('score1');
    const score2Element = document.getElementById('score2');

    let ballX = 290;
    let ballY = 190;
    let ballSpeedX = 4;
    let ballSpeedY = 2;
    let paddle1Y = 160;
    let paddle2Y = 160;
    let score1 = 0;
    let score2 = 0;
    let gameRunning = true;

    function moveBall() {
      if (!gameRunning) return;

      ballX += ballSpeedX;
      ballY += ballSpeedY;

      // Top/bottom wall collisions
      if (ballY <= 0 || ballY >= 380) {
        ballSpeedY = -ballSpeedY;
      }

      // Paddle 1 collision
      if (ballX <= 30 && ballX >= 20 && ballY >= paddle1Y && ballY <= paddle1Y + 80) {
        ballSpeedX = Math.abs(ballSpeedX);
        ballSpeedY += (ballY - (paddle1Y + 40)) * 0.1; // Add spin
      }

      // Paddle 2 collision
      if (ballX >= 570 && ballX <= 580 && ballY >= paddle2Y && ballY <= paddle2Y + 80) {
        ballSpeedX = -Math.abs(ballSpeedX);
        ballSpeedY += (ballY - (paddle2Y + 40)) * 0.1; // Add spin
      }

      // Score for player 2 (ball goes off left side)
      if (ballX < 0) {
        score2++;
        score2Element.textContent = score2;
        resetBall();
        if (score2 >= 5) {
          gameOver('Player 2 Wins!');
        }
      }

      // Score for player 1 (ball goes off right side)
      if (ballX > 600) {
        score1++;
        score1Element.textContent = score1;
        resetBall();
        if (score1 >= 5) {
          gameOver('Player 1 Wins!');
        }
      }

      ball.style.left = ballX + 'px';
      ball.style.top = ballY + 'px';

      setTimeout(moveBall, 20);
    }

    function resetBall() {
      ballX = 290;
      ballY = 190;
      ballSpeedX = Math.random() > 0.5 ? 4 : -4;
      ballSpeedY = (Math.random() - 0.5) * 4;
    }

    function movePaddle(player, delta) {
      if (player === 1) {
        paddle1Y += delta;
        if (paddle1Y < 0) paddle1Y = 0;
        if (paddle1Y > 320) paddle1Y = 320;
        paddle1.style.top = paddle1Y + 'px';
      } else {
        paddle2Y += delta;
        if (paddle2Y < 0) paddle2Y = 0;
        if (paddle2Y > 320) paddle2Y = 320;
        paddle2.style.top = paddle2Y + 'px';
      }
    }

    function gameOver(message) {
      gameRunning = false;
      alert(message);
    }

    function resetGame() {
      ballX = 290;
      ballY = 190;
      ballSpeedX = 4;
      ballSpeedY = 2;
      paddle1Y = 160;
      paddle2Y = 160;
      score1 = 0;
      score2 = 0;
      score1Element.textContent = score1;
      score2Element.textContent = score2;
      gameRunning = true;

      ball.style.left = ballX + 'px';
      ball.style.top = ballY + 'px';
      paddle1.style.top = paddle1Y + 'px';
      paddle2.style.top = paddle2Y + 'px';

      moveBall();
    }

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'w': case 'W': movePaddle(1, -20); break;
        case 's': case 'S': movePaddle(1, 20); break;
        case 'ArrowUp': movePaddle(2, -20); break;
        case 'ArrowDown': movePaddle(2, 20); break;
      }
    });

    moveBall();
  </script>
</body>
</html>
