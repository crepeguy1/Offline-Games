<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloon Burst</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #87CEEB;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #gameArea {
            position: relative;
            width: 400px;
            height: 400px;
            border: 2px solid #333;
            background: #ffffff;
            overflow: hidden;
        }
        .balloon {
            position: absolute;
            width: 50px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #ff69b4, #ff1493);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        #score {
            font-size: 24px;
            margin-bottom: 10px;
        }
        #timer {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Balloon Burst</h1>
    <div id="score">Score: 0</div>
    <div id="timer">Time: 30</div>
    <div id="gameArea"></div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');

        let score = 0;
        let timeLeft = 30;
        let gameRunning = true;
        let balloons = [];

        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.style.left = Math.random() * (gameArea.clientWidth - 50) + 'px';
            balloon.style.top = gameArea.clientHeight - 70 + 'px';
            balloon.addEventListener('click', burstBalloon);
            gameArea.appendChild(balloon);
            balloons.push(balloon);

            // Move up
            let top = parseFloat(balloon.style.top);
            const interval = setInterval(() => {
                top -= 2;
                balloon.style.top = top + 'px';
                if (top < -70) {
                    clearInterval(interval);
                    balloon.remove();
                    balloons = balloons.filter(b => b !== balloon);
                }
            }, 50);
        }

        function burstBalloon(e) {
            const balloon = e.target;
            score++;
            scoreDisplay.textContent = 'Score: ' + score;
            balloon.remove();
            balloons = balloons.filter(b => b !== balloon);
            window.parent.postMessage({ type: 'score', score: score }, '*');
        }

        function gameLoop() {
            if (Math.random() < 0.05) createBalloon();
        }

        const gameInterval = setInterval(gameLoop, 100);

        const timerInterval = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = 'Time: ' + timeLeft;
            if (timeLeft <= 0) {
                clearInterval(gameInterval);
                clearInterval(timerInterval);
                gameRunning = false;
                alert('Time\'s up! Final score: ' + score);
            }
        }, 1000);
    </script>
</body>
</html>
