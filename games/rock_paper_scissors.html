<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
    * {
      box-sizing: border-box;
    }

        body {
      margin: 0;
      padding: 10px;
      min-min-height: 100vh;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        h1 {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #333;
        }
        .choices {
            display: flex;
            gap: 20px;
            margin: 20px;
        }
        .choice {
            padding: 20px;
            font-size: 48px;
            background-color: white;
            border: 2px solid #333;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .choice:hover {
            background-color: #e0e0e0;
        }
        .results {
            text-align: center;
            margin: 20px;
        }
        .result {
            font-size: 24px;
            margin: 10px;
        }
        .score {
            font-size: 20px;
            margin: 10px;
        }
        button {
            padding: clamp(10px, 2vw, 18px);
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
              min-height: 44px;
      min-width: 44px;
      cursor: pointer;}
        button:hover {
            background-color: #45a049;
        }
    
    @media (max-width: 480px) {
      body { padding: 8px; }
    }
  

  .navigation {
    margin-top: 30px;
    text-align: center;
  }
  .back-btn {
    background: #4caf50 !important;
    color: white !important;
    border: none !important;
    padding: clamp(12px, 3vw, 20px) !important;
    border-radius: 8px !important;
    font-size: clamp(1rem, 3vw, 1.4rem) !important;
    min-height: 48px !important;
    cursor: pointer !important;
    transition: background 0.2s !important;
    font-weight: bold !important;
  }
  .back-btn:hover {
    background: #45a049 !important;
  }</style>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="choices">
        <div class="choice" id="rock">🪨</div>
        <div class="choice" id="paper">📄</div>
        <div class="choice" id="scissors">✂️</div>
    </div>
    <div class="results">
        <div class="result" id="player-choice">Your choice: </div>
        <div class="result" id="computer-choice">Computer's choice: </div>
        <div class="result" id="game-result"></div>
        <div class="score" id="score">Score - You: 0, Computer: 0</div>
    </div>
    <button id="reset">Reset Score</button>

    <script>
        const choices = document.querySelectorAll('.choice');
        const playerChoiceDisplay = document.getElementById('player-choice');
        const computerChoiceDisplay = document.getElementById('computer-choice');
        const gameResultDisplay = document.getElementById('game-result');
        const scoreDisplay = document.getElementById('score');
        const resetButton = document.getElementById('reset');

        let playerScore = 0;
        let computerScore = 0;

        const choiceMap = {
            rock: '🪨',
            paper: '📄',
            scissors: '✂️'
        };

        function getComputerChoice() {
            const choices = ['rock', 'paper', 'scissors'];
            return choices[Math.floor(Math.random() * choices.length)];
        }

        function determineWinner(playerChoice, computerChoice) {
            if (playerChoice === computerChoice) {
                return 'tie';
            }
            if (
                (playerChoice === 'rock' && computerChoice === 'scissors') ||
                (playerChoice === 'paper' && computerChoice === 'rock') ||
                (playerChoice === 'scissors' && computerChoice === 'paper')
            ) {
                return 'player';
            }
            return 'computer';
        }

        function updateScore(winner) {
            if (winner === 'player') {
                playerScore++;
                window.parent.postMessage({ type: 'score', score: playerScore }, '*');
            } else if (winner === 'computer') {
                computerScore++;
            }
            scoreDisplay.textContent = `Score - You: ${playerScore}, Computer: ${computerScore}`;
        }

        function playGame(playerChoice) {
            const computerChoice = getComputerChoice();
            const winner = determineWinner(playerChoice, computerChoice);

            playerChoiceDisplay.textContent = `Your choice: ${choiceMap[playerChoice]}`;
            computerChoiceDisplay.textContent = `Computer's choice: ${choiceMap[computerChoice]}`;

            if (winner === 'tie') {
                gameResultDisplay.textContent = 'It\'s a tie!';
            } else if (winner === 'player') {
                gameResultDisplay.textContent = 'You win!';
            } else {
                gameResultDisplay.textContent = 'Computer wins!';
            }

            updateScore(winner);
        }

        function resetScore() {
            playerScore = 0;
            computerScore = 0;
            scoreDisplay.textContent = `Score - You: ${playerScore}, Computer: ${computerScore}`;
            playerChoiceDisplay.textContent = 'Your choice: ';
            computerChoiceDisplay.textContent = 'Computer's choice: ';
            gameResultDisplay.textContent = '';
        }

        choices.forEach(choice => {
            choice.addEventListener('click', () => {
                playGame(choice.id);
            });
        });

        resetButton.addEventListener('click', resetScore);
    </script>

<div class="navigation">
  <button onclick="window.location.href='../index.html'" class="back-btn">🏠 Back to Game Hub</button>
</div></body>
</html>
