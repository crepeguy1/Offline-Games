<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            background-color: #000;
            color: white;
        }
        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin: 10px 0;
        }
        canvas {
            border: 2px solid #fff;
            background-color: #000;
            max-width: 100%;
            height: auto;
        }
        .score {
            font-size: clamp(1rem, 4vw, 1.5rem);
            margin: 20px;
        }
        button {
            padding: clamp(10px, 2vw, 18px);
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            min-height: 44px;
            min-width: 44px;
        }
        button:hover {
            background-color: #45a049;
        }
        button:active {
            transform: scale(0.95);
        }
        .controls {
            text-align: center;
            margin: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        @media (max-width: 480px) {
            body { padding: 8px; }
        }
    
  .navigation {
    margin-top: 30px;
    text-align: center;
  }
  .back-btn {
    background: #4caf50 !important;
    color: white !important;
    border: none !important;
    padding: clamp(12px, 3vw, 20px) !important;
    border-radius: 8px !important;
    font-size: clamp(1rem, 3vw, 1.4rem) !important;
    min-height: 48px !important;
    cursor: pointer !important;
    transition: background 0.2s !important;
    font-weight: bold !important;
  }
  .back-btn:hover {
    background: #45a049 !important;
  }</style>
            background-color: #45a049;
        }
        .instructions {
            text-align: center;
            margin: 20px;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <h1>Space Invaders</h1>
    <div class="instructions">
        Use arrow keys to move, spacebar to shoot. Destroy all invaders!
    </div>
    <div class="score" id="score">Score: 0</div>
    <canvas id="spaceinvaders" width="400" height="500"></canvas>
    <button id="restart">Restart Game</button>

    <script>
        const canvas = document.getElementById('spaceinvaders');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const restartButton = document.getElementById('restart');

        let score = 0;
        let gameOver = false;

        // Player
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 50,
            width: 50,
            height: 30,
            color: '#00ff00',
            speed: 5
        };

        // Invaders
        const invaders = [];
        const invaderRows = 5;
        const invaderCols = 8;
        const invaderWidth = 30;
        const invaderHeight = 20;
        const invaderPadding = 10;
        const invaderOffsetTop = 50;
        const invaderOffsetLeft = 50;

        for (let row = 0; row < invaderRows; row++) {
            for (let col = 0; col < invaderCols; col++) {
                invaders.push({
                    x: col * (invaderWidth + invaderPadding) + invaderOffsetLeft,
                    y: row * (invaderHeight + invaderPadding) + invaderOffsetTop,
                    width: invaderWidth,
                    height: invaderHeight,
                    alive: true
                });
            }
        }

        // Bullets
        const bullets = [];
        const bulletSpeed = 7;

        // Invader bullets
        const invaderBullets = [];
        const invaderBulletSpeed = 3;

        let rightPressed = false;
        let leftPressed = false;
        let spacePressed = false;

        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawPlayer() {
            drawRect(player.x, player.y, player.width, player.height, player.color);
        }

        function drawInvaders() {
            invaders.forEach(invader => {
                if (invader.alive) {
                    drawRect(invader.x, invader.y, invader.width, invader.height, '#ff0000');
                }
            });
        }

        function drawBullets() {
            bullets.forEach(bullet => {
                drawRect(bullet.x, bullet.y, 5, 10, '#ffff00');
            });
        }

        function drawInvaderBullets() {
            invaderBullets.forEach(bullet => {
                drawRect(bullet.x, bullet.y, 5, 10, '#ff00ff');
            });
        }

        function movePlayer() {
            if (rightPressed && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
            if (leftPressed && player.x > 0) {
                player.x -= player.speed;
            }
        }

        function shootBullet() {
            bullets.push({
                x: player.x + player.width / 2 - 2.5,
                y: player.y
            });
        }

        function updateBullets() {
            bullets.forEach((bullet, index) => {
                bullet.y -= bulletSpeed;
                if (bullet.y < 0) {
                    bullets.splice(index, 1);
                }
            });
        }

        function updateInvaderBullets() {
            invaderBullets.forEach((bullet, index) => {
                bullet.y += invaderBulletSpeed;
                if (bullet.y > canvas.height) {
                    invaderBullets.splice(index, 1);
                }
            });
        }

        function checkCollisions() {
            // Bullet vs Invader
            bullets.forEach((bullet, bulletIndex) => {
                invaders.forEach((invader, invaderIndex) => {
                    if (invader.alive &&
                        bullet.x < invader.x + invader.width &&
                        bullet.x + 5 > invader.x &&
                        bullet.y < invader.y + invader.height &&
                        bullet.y + 10 > invader.y) {
                        invader.alive = false;
                        bullets.splice(bulletIndex, 1);
                        score += 10;
                        scoreDisplay.textContent = `Score: ${score}`;
                    }
                });
            });

            // Invader bullet vs Player
            invaderBullets.forEach(bullet => {
                if (bullet.x < player.x + player.width &&
                    bullet.x + 5 > player.x &&
                    bullet.y < player.y + player.height &&
                    bullet.y + 10 > player.y) {
                    gameOver = true;
                }
            });
        }

        function invadersShoot() {
            const aliveInvaders = invaders.filter(invader => invader.alive);
            if (aliveInvaders.length > 0 && Math.random() < 0.01) { // 1% chance per frame
                const shooter = aliveInvaders[Math.floor(Math.random() * aliveInvaders.length)];
                invaderBullets.push({
                    x: shooter.x + shooter.width / 2 - 2.5,
                    y: shooter.y + shooter.height
                });
            }
        }

        function checkWin() {
            return invaders.every(invader => !invader.alive);
        }

        function gameLoop() {
            if (gameOver) {
                ctx.fillStyle = 'red';
                ctx.font = '48px Arial';
                ctx.fillText('Game Over!', canvas.width / 2 - 120, canvas.height / 2);
                return;
            }

            if (checkWin()) {
                ctx.fillStyle = 'green';
                ctx.font = '48px Arial';
                ctx.fillText('You Win!', canvas.width / 2 - 100, canvas.height / 2);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            movePlayer();
            updateBullets();
            updateInvaderBullets();
            checkCollisions();
            invadersShoot();

            drawPlayer();
            drawInvaders();
            drawBullets();
            drawInvaderBullets();

            requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            score = 0;
            gameOver = false;
            scoreDisplay.textContent = `Score: ${score}`;
            bullets.length = 0;
            invaderBullets.length = 0;

            // Reset invaders
            let index = 0;
            for (let row = 0; row < invaderRows; row++) {
                for (let col = 0; col < invaderCols; col++) {
                    invaders[index].alive = true;
                    index++;
                }
            }

            gameLoop();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') rightPressed = true;
            if (e.key === 'ArrowLeft') leftPressed = true;
            if (e.key === ' ') {
                e.preventDefault();
                if (!spacePressed) {
                    shootBullet();
                    spacePressed = true;
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowRight') rightPressed = false;
            if (e.key === 'ArrowLeft') leftPressed = false;
            if (e.key === ' ') spacePressed = false;
        });

        restartButton.addEventListener('click', restartGame);

        gameLoop();
    </script>

<div class="navigation">
  <button onclick="window.location.href='../index.html'" class="back-btn">🏠 Back to Game Hub</button>
</div></body>
</html>
