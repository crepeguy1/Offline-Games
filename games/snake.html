<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
  <title>Snake Game</title>   
  <style>
      body {
          font-family: Arial, sans-serif;
          background: #111;
          color: #eee;
          text-align: center;
          padding: 20px;
      }
      h1 {
          margin-bottom: 5px;
      }
      #gameCanvas {
          background: #333;
          border: 2px solid #444;
          border-radius: 8px;
          margin-top: 20px;
          touch-action: none;
      }
      .controls {
          margin-top: 20px;
      }
      .btn {
          background: #444;
          color: white;
          padding: 15px 25px;
          margin: 5px;
          border: none;
          border-radius: 8px;
          font-size: 20px;
      }
  
  .game-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin: 20px 0;
  }
  .leaderboard-btn, .reset-btn {
    background: #2196F3 !important;
    color: white !important;
    border: none !important;
    padding: clamp(10px, 2vw, 16px) !important;
    border-radius: 6px !important;
    font-size: clamp(0.9rem, 2.5vw, 1.2rem) !important;
    min-height: 44px !important;
    cursor: pointer !important;
    transition: background 0.2s !important;
  }
  .leaderboard-btn:hover, .reset-btn:hover {
    background: #1976D2 !important;
  }
  .reset-btn {
    background: #FF9800 !important;
  }
  .reset-btn:hover {
    background: #F57C00 !important;
  }
  #leaderboard {
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 20px;
    border-radius: 10px;
    margin: 20px auto;
    max-width: 300px;
    text-align: center;
  }
  #leaderboardList {
    text-align: left;
    margin: 15px 0;
  }
  #leaderboardList div {
    padding: 5px 0;
    border-bottom: 1px solid #444;
  }

  .navigation {
    margin-top: 30px;
    text-align: center;
  }
  .back-btn {
    background: #4caf50 !important;
    color: white !important;
    border: none !important;
    padding: clamp(12px, 3vw, 20px) !important;
    border-radius: 8px !important;
    font-size: clamp(1rem, 3vw, 1.4rem) !important;
    min-height: 48px !important;
    cursor: pointer !important;
    transition: background 0.2s !important;
    font-weight: bold !important;
  }
  .back-btn:hover {
    background: #45a049 !important;
  }</style>
</head>
<body>

  <h1>Snake Game</h1>
  <h2 id="scoreText">Score: 0</h2>
  <h3 id="highScoreText">High Score: 0</h3>
  <p>Use arrow keys, WASD, swipe, or buttons to play.</p>

  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <!-- PHONE BUTTON CONTROLS -->
  <div class="controls">
      <button class="btn" onclick="setDirection(0, -1)">⬆️</button><br>
      <button class="btn" onclick="setDirection(-1, 0)">⬅️</button>
      <button class="btn" onclick="setDirection(1, 0)">➡️</button><br>
      <button class="btn" onclick="setDirection(0, 1)">⬇️</button>
  </div>

  <div id="leaderboard" style="display: none;">
    <h3>🏆 Leaderboard</h3>
    <div id="leaderboardList"></div>
    <button onclick="hideLeaderboard()" class="back-btn" style="margin-top: 15px;">Close</button>
  </div>

  <div class="game-actions">
    <button onclick="showLeaderboard()" class="leaderboard-btn">📊 Leaderboard</button>
    <button onclick="resetGame()" class="reset-btn">🔄 New Game</button>
  </div>

<div class="navigation">
  <button onclick="window.location.href='../index.html'" class="back-btn">🏠 Back to Game Hub</button>
</div>

  <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const gridSize = 20;

      let snake = [{ x: 200, y: 200 }];
      let food = { x: 0, y: 0 };
      let direction = { x: 0, y: 0 };
      let started = false;
      let gameOver = false;
      let score = 0;
      let highScore = 0;

      const scoreText = document.getElementById("scoreText");
      const highScoreText = document.getElementById("highScoreText");

      // Load high score from localStorage
      function loadHighScore() {
        const saved = localStorage.getItem('snake_highScore');
        highScore = saved ? parseInt(saved) : 0;
        highScoreText.textContent = "High Score: " + highScore;
      }

      // Save high score to localStorage
      function saveHighScore() {
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('snake_highScore', highScore);
          highScoreText.textContent = "High Score: " + highScore;
        }
      }

      // Leaderboard functions
      function getLeaderboard() {
        const leaderboard = JSON.parse(localStorage.getItem('snake_leaderboard') || '[]');
        return leaderboard.sort((a, b) => b.score - a.score).slice(0, 10);
      }

      function saveToLeaderboard(playerName = 'Player') {
        const leaderboard = getLeaderboard();
        leaderboard.push({ name: playerName, score: score, date: new Date().toLocaleDateString() });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard.splice(10); // Keep only top 10
        localStorage.setItem('snake_leaderboard', JSON.stringify(leaderboard));
      }

      function showLeaderboard() {
        const leaderboard = getLeaderboard();
        const listEl = document.getElementById('leaderboardList');
        listEl.innerHTML = leaderboard.length === 0 ?
          '<div>No scores yet!</div>' :
          leaderboard.map((entry, index) =>
            `<div>${index + 1}. ${entry.name}: ${entry.score} (${entry.date})</div>`
          ).join('');
        document.getElementById('leaderboard').style.display = 'block';
      }

      function hideLeaderboard() {
        document.getElementById('leaderboard').style.display = 'none';
      }

      function resetGame() {
        snake = [{ x: 200, y: 200 }];
        direction = { x: 0, y: 0 };
        started = false;
        gameOver = false;
        score = 0;
        scoreText.textContent = "Score: 0";
        placeFood();
        draw();
      }

      function placeFood() {
          food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
          food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
      }

      function setDirection(dx, dy) {
          if (!started) started = true;

          if (dx !== 0 && direction.x === 0) direction = { x: dx * gridSize, y: 0 };
          if (dy !== 0 && direction.y === 0) direction = { x: 0, y: dy * gridSize };
      }

      function gameLoop() {
          if (!started || gameOver) return;

          const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

          if (
              head.x < 0 || head.x >= canvas.width ||
              head.y < 0 || head.y >= canvas.height ||
              snake.some(segment => segment.x === head.x && segment.y === head.y)
          ) {
              gameOver = true;
              saveHighScore();
              saveToLeaderboard();
              alert("Game Over! Score: " + score + (score === highScore ? " 🎉 New High Score!" : ""));
              return;
          }

          snake.unshift(head);

          if (head.x === food.x && head.y === food.y) {
              placeFood();
              score++;
              scoreText.textContent = "Score: " + score;
              saveHighScore();
              window.parent.postMessage({ type: 'score', score: score }, '*');
          } else {
              snake.pop();
          }

          ctx.clearRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = "red";
          ctx.fillRect(food.x, food.y, gridSize, gridSize);

          ctx.fillStyle = "lime";
          snake.forEach(segment => ctx.fillRect(segment.x, segment.y, gridSize, gridSize));
      }

      // KEYBOARD CONTROLS
      document.addEventListener("keydown", e => {
          if (!started) started = true;

          if (e.key === "ArrowUp" && direction.y === 0) {
            e.preventDefault();
            setDirection(0, -1);
          } else if (e.key === "ArrowDown" && direction.y === 0) {
            e.preventDefault();
            setDirection(0, 1);
          } else if (e.key === "ArrowLeft" && direction.x === 0) {
            e.preventDefault();
            setDirection(-1, 0);
          } else if (e.key === "ArrowRight" && direction.x === 0) {
            e.preventDefault();
            setDirection(1, 0);
          } else if (e.key === "w" && direction.y === 0) {
            e.preventDefault();
            setDirection(0, -1);
          } else if (e.key === "s" && direction.y === 0) {
            e.preventDefault();
            setDirection(0, 1);
          } else if (e.key === "a" && direction.x === 0) {
            e.preventDefault();
            setDirection(-1, 0);
          } else if (e.key === "d" && direction.x === 0) {
            e.preventDefault();
            setDirection(1, 0);
          }
      });

      // SWIPE CONTROLS
      let startX = 0, startY = 0;

      canvas.addEventListener("touchstart", e => {
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
      });

      canvas.addEventListener("touchend", e => {
          let dx = e.changedTouches[0].clientX - startX;
          let dy = e.changedTouches[0].clientY - startY;

          if (Math.abs(dx) > Math.abs(dy)) {
              if (dx > 0) setDirection(1, 0);
              else setDirection(-1, 0);
          } else {
              if (dy > 0) setDirection(0, 1);
              else setDirection(0, -1);
          }
      });

      loadHighScore();
      placeFood();
      setInterval(gameLoop, 100);
  </script>

</body>
</html>
