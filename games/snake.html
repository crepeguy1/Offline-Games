<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">    
  <title>Snake Game</title>   
  <style>
      body {
          font-family: Arial, sans-serif;
          background: #111;
          color: #eee;
          text-align: center;
          padding: 20px;
      }
      h1 {
          margin-bottom: 5px;
      }
      #gameCanvas {
          background: #333;
          border: 2px solid #444;
          border-radius: 8px;
          margin-top: 20px;
          touch-action: none;
      }
      .controls {
          margin-top: 20px;
      }
      .btn {
          background: #444;
          color: white;
          padding: 15px 25px;
          margin: 5px;
          border: none;
          border-radius: 8px;
          font-size: 20px;
      }
  </style>
</head>
<body>

  <h1>Snake Game</h1>
  <p>Use arrow keys, WASD, swipe, or buttons to play.</p>

  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <!-- PHONE BUTTON CONTROLS -->
  <div class="controls">
      <button class="btn" onclick="setDirection(0, -1)">⬆️</button><br>
      <button class="btn" onclick="setDirection(-1, 0)">⬅️</button>
      <button class="btn" onclick="setDirection(1, 0)">➡️</button><br>
      <button class="btn" onclick="setDirection(0, 1)">⬇️</button>
  </div>

  <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const gridSize = 20;

      let snake = [{ x: 200, y: 200 }];
      let food = { x: 0, y: 0 };
      let direction = { x: 0, y: 0 };
      let started = false;
      let gameOver = false;
      let score = 0;

      function placeFood() {
          food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
          food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
      }

      function setDirection(dx, dy) {
          if (!started) started = true;

          if (dx !== 0 && direction.x === 0) direction = { x: dx * gridSize, y: 0 };
          if (dy !== 0 && direction.y === 0) direction = { x: 0, y: dy * gridSize };
      }

      function gameLoop() {
          if (!started || gameOver) return;

          const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

          if (
              head.x < 0 || head.x >= canvas.width ||
              head.y < 0 || head.y >= canvas.height ||
              snake.some(segment => segment.x === head.x && segment.y === head.y)
          ) {
              gameOver = true;
              alert("Game Over! Refresh or reload the hub to play again.");
              return;
          }

          snake.unshift(head);

          if (head.x === food.x && head.y === food.y) {
              placeFood();
              score++;
              window.parent.postMessage({ type: 'score', score: score }, '*');
          } else {
              snake.pop();
          }

          ctx.clearRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = "red";
          ctx.fillRect(food.x, food.y, gridSize, gridSize);

          ctx.fillStyle = "lime";
          snake.forEach(segment => ctx.fillRect(segment.x, segment.y, gridSize, gridSize));
      }

      // KEYBOARD CONTROLS
      document.addEventListener("keydown", e => {
          if (!started) started = true;

          if (e.key === "ArrowUp" && direction.y === 0) {
            e.preventDefault();
            setDirection(0, -1);
          } else if (e.key === "ArrowDown" && direction.y === 0) {
            e.preventDefault();
            setDirection(0, 1);
          } else if (e.key === "ArrowLeft" && direction.x === 0) {
            e.preventDefault();
            setDirection(-1, 0);
          } else if (e.key === "ArrowRight" && direction.x === 0) {
            e.preventDefault();
            setDirection(1, 0);
          } else if (e.key === "w" && direction.y === 0) {
            e.preventDefault();
            setDirection(0, -1);
          } else if (e.key === "s" && direction.y === 0) {
            e.preventDefault();
            setDirection(0, 1);
          } else if (e.key === "a" && direction.x === 0) {
            e.preventDefault();
            setDirection(-1, 0);
          } else if (e.key === "d" && direction.x === 0) {
            e.preventDefault();
            setDirection(1, 0);
          }
      });

      // SWIPE CONTROLS
      let startX = 0, startY = 0;

      canvas.addEventListener("touchstart", e => {
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
      });

      canvas.addEventListener("touchend", e => {
          let dx = e.changedTouches[0].clientX - startX;
          let dy = e.changedTouches[0].clientY - startY;

          if (Math.abs(dx) > Math.abs(dy)) {
              if (dx > 0) setDirection(1, 0);
              else setDirection(-1, 0);
          } else {
              if (dy > 0) setDirection(0, 1);
              else setDirection(0, -1);
          }
      });

      placeFood();
      setInterval(gameLoop, 100);
  </script>

</body>
</html>
