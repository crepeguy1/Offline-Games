<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2048</title>
<style>
  body {
    background: #111;
    color: #eee;
    text-align: center;
    font-family: Arial;
  }
  #game {
    width: 260px;
    height: 260px;
    margin: 20px auto;
    background: #000;
    border: 3px solid #444;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-gap: 5px;
    padding: 5px;
  }
  .cell {
    background: #222;
    color: #eee;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60px;
    border-radius: 4px;
  }
  .controls button {
    background: #333;
    color: white;
    border: none;
    padding: 10px 18px;
    margin: 5px;
    border-radius: 6px;
    font-size: 18px;
  }
</style>
</head>
<body>

<h1>2048</h1>
<h2 id="scoreText">Score: 0</h2>
<div id="game"></div>

<div class="controls">
  <button onclick="move('up')">⬆️</button><br>
  <button onclick="move('left')">⬅️</button>
  <button onclick="move('right')">➡️</button><br>
  <button onclick="move('down')">⬇️</button>
</div>

<script>
const size = 4;
let board = [];
let score = 0;

const gameEl = document.getElementById("game");
const scoreEl = document.getElementById("scoreText");

function initBoard() {
  board = [];
  for (let i = 0; i < size; i++) {
    board[i] = [];
    for (let j = 0; j < size; j++) {
      board[i][j] = 0;
    }
  }
  addRandom();
  addRandom();
  draw();
}

function addRandom() {
  let empty = [];
  for (let i = 0; i < size; i++) {
    for (let j = 0; j < size; j++) {
      if (board[i][j] === 0) empty.push({i, j});
    }
  }
  if (empty.length === 0) return;
  let spot = empty[Math.floor(Math.random() * empty.length)];
  board[spot.i][spot.j] = Math.random() < 0.9 ? 2 : 4;
}

function draw() {
  gameEl.innerHTML = "";
  for (let i = 0; i < size; i++) {
    for (let j = 0; j < size; j++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      if (board[i][j] !== 0) cell.textContent = board[i][j];
      gameEl.appendChild(cell);
    }
  }
  scoreEl.textContent = "Score: " + score;
}

function slide(row) {
  let arr = row.filter(v => v !== 0);
  while (arr.length < size) arr.push(0);
  return arr;
}

function combine(row) {
  for (let i = 0; i < size - 1; i++) {
    if (row[i] !== 0 && row[i] === row[i+1]) {
      row[i] *= 2;
      score += row[i];
      row[i+1] = 0;
    }
  }
  return row;
}

function move(direction) {
  let oldBoard = JSON.stringify(board);

  if (direction === "left") {
    for (let i = 0; i < size; i++) {
      let row = board[i];
      row = slide(row);
      row = combine(row);
      row = slide(row);
      board[i] = row;
    }
  } else if (direction === "right") {
    for (let i = 0; i < size; i++) {
      let row = board[i].slice().reverse();
      row = slide(row);
      row = combine(row);
      row = slide(row);
      board[i] = row.reverse();
    }
  } else if (direction === "up") {
    for (let j = 0; j < size; j++) {
      let col = [];
      for (let i = 0; i < size; i++) col.push(board[i][j]);
      col = slide(col);
      col = combine(col);
      col = slide(col);
      for (let i = 0; i < size; i++) board[i][j] = col[i];
    }
  } else if (direction === "down") {
    for (let j = 0; j < size; j++) {
      let col = [];
      for (let i = 0; i < size; i++) col.push(board[i][j]);
      col = col.reverse();
      col = slide(col);
      col = combine(col);
      col = slide(col);
      col = col.reverse();
      for (let i = 0; i < size; i++) board[i][j] = col[i];
    }
  }

  if (JSON.stringify(board) !== oldBoard) {
    addRandom();
    draw();
    checkGameOver();
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" || e.key === "a") {
    e.preventDefault();
    move("left");
  } else if (e.key === "ArrowRight" || e.key === "d") {
    e.preventDefault();
    move("right");
  } else if (e.key === "ArrowUp" || e.key === "w") {
    e.preventDefault();
    move("up");
  } else if (e.key === "ArrowDown" || e.key === "s") {
    e.preventDefault();
    move("down");
  }
});

// Swipe support for mobile
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

document.addEventListener('touchend', function(e) {
  if (!touchStartX || !touchStartY) return;
  let touchEndX = e.changedTouches[0].clientX;
  let touchEndY = e.changedTouches[0].clientY;
  let diffX = touchEndX - touchStartX;
  let diffY = touchEndY - touchStartY;
  if (Math.abs(diffX) > Math.abs(diffY)) {
    if (diffX > 50) move('right');
    else if (diffX < -50) move('left');
  } else {
    if (diffY > 50) move('down');
    else if (diffY < -50) move('up');
  }
  touchStartX = 0;
  touchStartY = 0;
});

function checkGameOver() {
  for (let i = 0; i < size; i++) {
    for (let j = 0; j < size; j++) {
      if (board[i][j] === 0) return;
      if (j < size - 1 && board[i][j] === board[i][j+1]) return;
      if (i < size - 1 && board[i][j] === board[i+1][j]) return;
    }
  }
  alert("Game Over! Score: " + score);
}

initBoard();
</script>

</body>
</html>
