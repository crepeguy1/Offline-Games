<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Time Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 10px;
      min-min-height: 100vh;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      margin-top: 80px;
    }
    #box {
      width: 200px;
      height: 200px;
      background: red;
      margin: 40px auto;
      display: none;
      border-radius: 12px;
    }
    button {
      padding: clamp(10px, 2vw, 18px);
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      border: none;
      border-radius: 8px;
      background: #00aaff;
      color: white;
          min-height: 44px;
      min-width: 44px;
      cursor: pointer;}
  
    @media (max-width: 480px) {
      body { padding: 8px; }
    }
  

  .navigation {
    margin-top: 30px;
    text-align: center;
  }
  .back-btn {
    background: #4caf50 !important;
    color: white !important;
    border: none !important;
    padding: clamp(12px, 3vw, 20px) !important;
    border-radius: 8px !important;
    font-size: clamp(1rem, 3vw, 1.4rem) !important;
    min-height: 48px !important;
    cursor: pointer !important;
    transition: background 0.2s !important;
    font-weight: bold !important;
  }
  .back-btn:hover {
    background: #45a049 !important;
  }</style>
</head>
<body>

  <h1>Reaction Time Test</h1>
  <p>Tap the box as fast as you can when it appears.</p>

  <button onclick="startGame()">Start</button>

  <div id="box" onclick="boxClicked()"></div>

  <h2 id="result"></h2>

  <script>
    let startTime;

    function randomDelay() {
      return Math.random() * 2000 + 1000; // 1–3 seconds
    }

    function startGame() {
      document.getElementById("result").textContent = "";
      document.getElementById("box").style.display = "none";

      setTimeout(() => {
        startTime = Date.now();
        document.getElementById("box").style.display = "block";
      }, randomDelay());
    }

    function boxClicked() {
      let reaction = Date.now() - startTime;
      document.getElementById("result").textContent =
        "Your reaction time: " + reaction + " ms";
      document.getElementById("box").style.display = "none";
    }
  </script>


<div class="navigation">
  <button onclick="window.location.href='../index.html'" class="back-btn">🏠 Back to Game Hub</button>
</div></body>
</html>
