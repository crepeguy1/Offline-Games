<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake (Simple Version)</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 10px;
      min-min-height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    h1 {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #333;
      margin-bottom: 8px;
    }
    #gameBoard {
      display: grid;
      grid-template-columns: repeat(20, 20px);
      grid-template-rows: repeat(20, 20px);
      gap: 1px;
      background-color: #333;
      padding: 10px;
      margin: 20px auto;
      width: 420px;
      height: 420px;
    }
    .cell {
      width: 20px;
      height: 20px;
      background-color: #fff;
    }
    .snake {
      background-color: var(--snake-color, #4caf50);
    }
    .food {
      background-color: #f44336;
    }
    .score-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .score-row span {
      font-size: 22px;
      font-weight: bold;
    }
    button {
      padding: clamp(10px, 2vw, 18px);
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 8px;
      min-width: 100px;
          min-height: 44px;
      min-width: 44px;
      cursor: pointer;}
    button:hover {
      background-color: #45a049;
    }
    .controls {
      margin: 10px auto;
      font-size: 18px;
      max-width: 420px;
    }
    #colorPicker {
      margin-top: 8px;
      width: 42px;
      height: 42px;
      border: none;
      cursor: pointer;
      background: transparent;
    }
  
    @media (max-width: 480px) {
      body { padding: 8px; }
    }
  

  .navigation {
    margin-top: 30px;
    text-align: center;
  }
  .back-btn {
    background: #4caf50 !important;
    color: white !important;
    border: none !important;
    padding: clamp(12px, 3vw, 20px) !important;
    border-radius: 8px !important;
    font-size: clamp(1rem, 3vw, 1.4rem) !important;
    min-height: 48px !important;
    cursor: pointer !important;
    transition: background 0.2s !important;
    font-weight: bold !important;
  }
  .back-btn:hover {
    background: #45a049 !important;
  }</style>
</head>
<body>
  <h1>Snake (Simple)</h1>
  <div class="score-row">
    <span>Score: <strong id="score">0</strong></span>
    <span>Best: <strong id="bestScore">0</strong></span>
    <label>Color: <input type="color" id="colorPicker" title="Snake color"></label>
  </div>
  <div id="gameBoard"></div>
  <div class="controls">
    Use arrow keys or buttons to move<br>
    <button onclick="changeDirection('up')">↑</button><br>
    <button onclick="changeDirection('left')">←</button>
    <button onclick="changeDirection('down')">↓</button>
    <button onclick="changeDirection('right')">→</button>
  </div>
<div class="navigation">
  <button onclick="window.location.href='../index.html'" class="back-btn">🏠 Back to Game Hub</button>
</div>
  <button onclick="resetGame()">Restart</button>

  <script>
    const boardSize = 20;
    const gameBoard = document.getElementById('gameBoard');
    const scoreElement = document.getElementById('score');
    const bestScoreElement = document.getElementById('bestScore');
    const colorPicker = document.getElementById('colorPicker');

    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let direction = 'right';
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('snakeBestScore') || '0', 10);
    let gameRunning = true;
    let snakeColor = '#4caf50';

    function createBoard() {
      gameBoard.innerHTML = '';
      for (let y = 0; y < boardSize; y++) {
        for (let x = 0; x < boardSize; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.id = `cell-${x}-${y}`;
          gameBoard.appendChild(cell);
        }
      }
    }

    function updateBoard() {
      document.querySelectorAll('.cell').forEach(cell => {
        cell.className = 'cell';
      });
      snake.forEach(segment => {
        const cell = document.getElementById(`cell-${segment.x}-${segment.y}`);
        if (cell) cell.classList.add('snake');
      });
      const foodCell = document.getElementById(`cell-${food.x}-${food.y}`);
      if (foodCell) foodCell.classList.add('food');
    }

    function moveSnake() {
      if (!gameRunning) return;
      const head = {...snake[0]};
      switch(direction) {
        case 'up': head.y--; break;
        case 'down': head.y++; break;
        case 'left': head.x--; break;
        case 'right': head.x++; break;
      }
      if (head.x < 0 || head.x >= boardSize || head.y < 0 || head.y >= boardSize) {
        gameOver();
        return;
      }
      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        gameOver();
        return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreElement.textContent = score;
        generateFood();
      } else {
        snake.pop();
      }
      updateBoard();
    }

    function generateFood() {
      do {
        food.x = Math.floor(Math.random() * boardSize);
        food.y = Math.floor(Math.random() * boardSize);
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function changeDirection(newDirection) {
      if (!gameRunning) return;
      const opposites = {
        'up': 'down',
        'down': 'up',
        'left': 'right',
        'right': 'left'
      };
      if (opposites[direction] !== newDirection) {
        direction = newDirection;
        playSound();
      }
    }

    function playSound() {
      try {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const osc = context.createOscillator();
        const gain = context.createGain();
        osc.connect(gain);
        gain.connect(context.destination);
        osc.type = 'sine';
        osc.frequency.value = 350;
        gain.gain.value = 0.12;
        osc.start();
        setTimeout(() => {
          osc.stop();
          context.close();
        }, 80);
      } catch (e) {
        console.warn('Sound unavailable', e);
      }
    }

    function gameOver() {
      gameRunning = false;
      alert(`Game Over! Score: ${score}`);
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('snakeBestScore', bestScore.toString());
        bestScoreElement.textContent = bestScore;
      }
      sendScore();
    }

    function resetGame() {
      snake = [{x: 10, y: 10}];
      direction = 'right';
      score = 0;
      scoreElement.textContent = score;
      gameRunning = true;
      generateFood();
      updateBoard();
      sendScore();
    }

    function sendScore() {
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'score', game: 'Snake', value: bestScore }, '*');
        if (bestScore >= 15) {
          window.parent.postMessage({ type: 'badge', badge: 'Snake master' }, '*');
        }
      }
    }

    function setSnakeColor(color) {
      snakeColor = color;
      document.documentElement.style.setProperty('--snake-color', color);
      localStorage.setItem('snakeColor', color);
    }

    colorPicker.addEventListener('input', () => setSnakeColor(colorPicker.value));

    function getColorFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get('color');
    }

    const queryColor = getColorFromQuery();
    const savedColor = queryColor || localStorage.getItem('snakeColor') || '#4caf50';
    colorPicker.value = savedColor;
    setSnakeColor(savedColor);
    bestScoreElement.textContent = bestScore;

    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowUp': changeDirection('up'); break;
        case 'ArrowDown': changeDirection('down'); break;
        case 'ArrowLeft': changeDirection('left'); break;
        case 'ArrowRight': changeDirection('right'); break;
      }
    });

    createBoard();
    updateBoard();
    setInterval(moveSnake, 200);
    window.addEventListener('DOMContentLoaded', () => sendScore());
  </script>
</body>
</html>
