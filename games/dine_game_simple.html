<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Game (Simple)</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 10px;
      min-min-height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      text-align: center;
      padding: 20px;
      margin: 0;
      overflow: hidden;
    }
    h1 {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: #333;
      margin: 10px;
    }
    #gameArea {
      position: relative;
      width: 800px;
      height: 200px;
      background-color: #ffffff;
      border: 2px solid #ccc;
      margin: 20px auto;
      overflow: hidden;
    }
    #dino {
      position: absolute;
      width: 40px;
      height: 40px;
      background-color: #4CAF50;
      bottom: 0;
      left: 50px;
      border-radius: 5px;
    }
    #dino.jumping {
      animation: jump 0.6s ease-out;
    }
    @keyframes jump {
      0% { bottom: 0; }
      50% { bottom: 80px; }
      100% { bottom: 0; }
    }
    .cactus {
      position: absolute;
      width: 20px;
      height: 40px;
      background-color: #228b22;
      bottom: 0;
      border-radius: 3px;
    }
    .cactus.large {
      width: 30px;
      height: 60px;
    }
    #ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 2px;
      background-color: #333;
    }
    .cloud {
      position: absolute;
      width: 40px;
      height: 20px;
      background-color: #fff;
      border-radius: 20px;
      top: 20px;
    }
    .score {
      font-size: 24px;
      margin: 20px;
      color: #333;
    }
    button {
      padding: clamp(10px, 2vw, 18px);
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
          min-height: 44px;
      min-width: 44px;
      cursor: pointer;}
    button:hover {
      background-color: #45a049;
    }
    .controls {
      margin: 20px;
      font-size: 18px;
    }
  
    @media (max-width: 480px) {
      body { padding: 8px; }
    }
  

  .navigation {
    margin-top: 30px;
    text-align: center;
  }
  .back-btn {
    background: #4caf50 !important;
    color: white !important;
    border: none !important;
    padding: clamp(12px, 3vw, 20px) !important;
    border-radius: 8px !important;
    font-size: clamp(1rem, 3vw, 1.4rem) !important;
    min-height: 48px !important;
    cursor: pointer !important;
    transition: background 0.2s !important;
    font-weight: bold !important;
  }
  .back-btn:hover {
    background: #45a049 !important;
  }</style>
</head>
<body>
  <h1>Dino Game (Simple)</h1>
  <div class="score">Score: <span id="score">0</span></div>
  <div id="gameArea">
    <div id="dino"></div>
    <div id="ground"></div>
  </div>
  <div class="controls">
    Press spacebar or click to jump<br>
    <button onclick="jump()">Jump!</button>
  </div>
<div class="navigation">
  <button onclick="window.location.href='../index.html'" class="back-btn">🏠 Back to Game Hub</button>
</div>
  <button onclick="resetGame()">Restart</button>

  <script>
    const gameArea = document.getElementById('gameArea');
    const dino = document.getElementById('dino');
    const scoreElement = document.getElementById('score');

    let obstacles = [];
    let clouds = [];
    let score = 0;
    let gameRunning = true;
    let gameSpeed = 5;
    let jumpHeight = 80;
    let isJumping = false;

    function createObstacle() {
      const obstacle = document.createElement('div');
      obstacle.className = Math.random() < 0.3 ? 'cactus large' : 'cactus';
      obstacle.style.left = '800px';
      gameArea.appendChild(obstacle);
      obstacles.push(obstacle);
    }

    function createCloud() {
      const cloud = document.createElement('div');
      cloud.className = 'cloud';
      cloud.style.left = '800px';
      cloud.style.top = (Math.random() * 50 + 10) + 'px';
      gameArea.appendChild(cloud);
      clouds.push(cloud);
    }

    function moveObstacles() {
      obstacles.forEach((obstacle, index) => {
        const currentLeft = parseInt(obstacle.style.left);
        obstacle.style.left = (currentLeft - gameSpeed) + 'px';

        // Check collision
        const dinoRect = dino.getBoundingClientRect();
        const obstacleRect = obstacle.getBoundingClientRect();

        if (dinoRect.right > obstacleRect.left &&
            dinoRect.left < obstacleRect.right &&
            dinoRect.bottom > obstacleRect.top &&
            !isJumping) {
          gameOver();
        }

        // Remove off-screen obstacles
        if (currentLeft < -50) {
          gameArea.removeChild(obstacle);
          obstacles.splice(index, 1);
          score++;
          scoreElement.textContent = score;
          gameSpeed += 0.1; // Gradually increase speed
        }
      });
    }

    function moveClouds() {
      clouds.forEach((cloud, index) => {
        const currentLeft = parseInt(cloud.style.left);
        cloud.style.left = (currentLeft - 1) + 'px';

        // Remove off-screen clouds
        if (currentLeft < -50) {
          gameArea.removeChild(cloud);
          clouds.splice(index, 1);
        }
      });
    }

    function jump() {
      if (isJumping) return;

      isJumping = true;
      dino.classList.add('jumping');

      setTimeout(() => {
        isJumping = false;
        dino.classList.remove('jumping');
      }, 600);
    }

    function gameOver() {
      gameRunning = false;
      alert(`Game Over! Score: ${score}`);
    }

    function gameLoop() {
      if (!gameRunning) return;

      moveObstacles();
      moveClouds();

      // Create new obstacles
      if (Math.random() < 0.01) {
        createObstacle();
      }

      // Create new clouds
      if (Math.random() < 0.005) {
        createCloud();
      }

      setTimeout(gameLoop, 20);
    }

    function resetGame() {
      // Clear existing obstacles and clouds
      obstacles.forEach(obstacle => {
        if (obstacle.parentNode) gameArea.removeChild(obstacle);
      });
      clouds.forEach(cloud => {
        if (cloud.parentNode) gameArea.removeChild(cloud);
      });

      obstacles = [];
      clouds = [];
      score = 0;
      gameSpeed = 5;
      isJumping = false;
      scoreElement.textContent = score;
      gameRunning = true;

      dino.classList.remove('jumping');

      gameLoop();
    }

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        jump();
      }
    });

    // Click controls
    gameArea.addEventListener('click', jump);

    resetGame();
  </script>
</body>
</html>
