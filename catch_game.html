<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Apples</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            border: 2px solid #333;
            background: #87CEEB;
        }
        #score {
            font-size: 24px;
            margin-bottom: 10px;
        }
        #instructions {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Catch the Apples</h1>
    <div id="score">Score: 0</div>
    <div id="instructions">Use arrow keys to move the basket and catch falling apples!</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');

        let basket = { x: 150, y: 350, width: 100, height: 20 };
        let apples = [];
        let score = 0;
        let gameRunning = true;

        // Basket movement
        let leftPressed = false;
        let rightPressed = false;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') leftPressed = true;
            if (e.key === 'ArrowRight') rightPressed = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') leftPressed = false;
            if (e.key === 'ArrowRight') rightPressed = false;
        });

        function update() {
            // Move basket
            if (leftPressed && basket.x > 0) basket.x -= 5;
            if (rightPressed && basket.x < canvas.width - basket.width) basket.x += 5;

            // Update apples
            apples.forEach((apple, index) => {
                apple.y += apple.speed;
                if (apple.y > canvas.height) {
                    apples.splice(index, 1);
                } else if (apple.y + apple.size > basket.y && apple.x > basket.x && apple.x < basket.x + basket.width) {
                    score++;
                    apples.splice(index, 1);
                    window.parent.postMessage({ type: 'score', score: score }, '*');
                }
            });

            // Add new apple
            if (Math.random() < 0.02) {
                apples.push({
                    x: Math.random() * (canvas.width - 20),
                    y: 0,
                    size: 20,
                    speed: 2 + Math.random() * 2
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw basket
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);

            // Draw apples
            ctx.fillStyle = '#FF0000';
            apples.forEach(apple => {
                ctx.beginPath();
                ctx.arc(apple.x + apple.size/2, apple.y + apple.size/2, apple.size/2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
                scoreDisplay.textContent = 'Score: ' + score;
                requestAnimationFrame(gameLoop);
            }
        }

        gameLoop();
    </script>
</body>
</html>
