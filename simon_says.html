<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 150px);
            grid-template-rows: repeat(2, 150px);
            gap: 20px;
            margin: 20px;
        }
        .color-button {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .color-button:active {
            opacity: 0.7;
        }
        .red { background-color: #ff0000; }
        .green { background-color: #00ff00; }
        .blue { background-color: #0000ff; }
        .yellow { background-color: #ffff00; }
        .status {
            font-size: 24px;
            margin: 20px;
            text-align: center;
        }
        .score {
            font-size: 20px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <h1>Simon Says</h1>
    <div class="status" id="status">Press Start to begin</div>
    <div class="score" id="score">Score: 0</div>
    <div class="game-board">
        <div class="color-button red" id="red"></div>
        <div class="color-button green" id="green"></div>
        <div class="color-button blue" id="blue"></div>
        <div class="color-button yellow" id="yellow"></div>
    </div>
    <div class="controls">
        <button id="start">Start Game</button>
        <button id="reset">Reset</button>
    </div>

    <script>
        const colors = ['red', 'green', 'blue', 'yellow'];
        const colorButtons = document.querySelectorAll('.color-button');
        const status = document.getElementById('status');
        const scoreDisplay = document.getElementById('score');
        const startButton = document.getElementById('start');
        const resetButton = document.getElementById('reset');

        let sequence = [];
        let playerSequence = [];
        let level = 0;
        let gameActive = false;

        function playSound(color) {
            // Simple beep sound using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            const frequencies = {
                red: 261.63, // C4
                green: 329.63, // E4
                blue: 392.00, // G4
                yellow: 523.25 // C5
            };

            oscillator.frequency.setValueAtTime(frequencies[color], audioContext.currentTime);
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function flashColor(color) {
            const button = document.getElementById(color);
            button.style.opacity = '1';
            setTimeout(() => {
                button.style.opacity = '0.5';
            }, 300);
            playSound(color);
        }

        function playSequence() {
            gameActive = false;
            status.textContent = 'Watch the sequence...';
            let i = 0;
            const interval = setInterval(() => {
                flashColor(sequence[i]);
                i++;
                if (i >= sequence.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        gameActive = true;
                        status.textContent = 'Your turn!';
                        playerSequence = [];
                    }, 1000);
                }
            }, 600);
        }

        function addToSequence() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
        }

        function checkPlayerInput(color) {
            playerSequence.push(color);
            flashColor(color);

            const currentIndex = playerSequence.length - 1;
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                status.textContent = 'Wrong! Game Over';
                gameActive = false;
                return;
            }

            if (playerSequence.length === sequence.length) {
                level++;
                scoreDisplay.textContent = `Score: ${level}`;
                status.textContent = 'Correct! Next level...';
                setTimeout(() => {
                    addToSequence();
                    playSequence();
                }, 1000);
            }
        }

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 0;
            scoreDisplay.textContent = 'Score: 0';
            addToSequence();
            playSequence();
        }

        function resetGame() {
            sequence = [];
            playerSequence = [];
            level = 0;
            gameActive = false;
            scoreDisplay.textContent = 'Score: 0';
            status.textContent = 'Press Start to begin';
        }

        colorButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (!gameActive) return;
                const color = button.id;
                checkPlayerInput(color);
            });
        });

        startButton.addEventListener('click', startGame);
        resetButton.addEventListener('click', resetGame);
    </script>
</body>
</html>
