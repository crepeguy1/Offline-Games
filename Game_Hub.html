<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Game Hub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: blue;
      font-size: 36px;
    }

    p {
      font-size: 18px;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
    }

    .game-button {
      padding: 15px;
      font-size: 16px;
      background-color: lightblue;
      border: 1px solid blue;
      color: black;
      cursor: pointer;
      width: 200px;
    }

    .game-button:hover {
      background-color: blue;
      color: white;
    }

    #search {
      padding: 8px;
      font-size: 14px;
      border: 1px solid black;
      width: 200px;
      margin-bottom: 20px;
    }

    iframe {
      width: 800px;
      height: 500px;
      border: 1px solid black;
      margin-top: 20px;
    }

    #loading {
      display: none;
      margin-top: 20px;
      font-size: 18px;
    }

    #back-button {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background-color: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    footer {
      margin-top: 20px;
      font-size: 14px;
      color: gray;
    }
  </style>
</head>
<body>

  <h1>My Game Hub</h1>
  <p>Click on a game to play it!</p>

  <!-- search box -->
  <input type="text" id="search" placeholder="Search games...">

  <!-- game buttons -->
  <nav id="game-nav">
    <button class="game-button" onclick="loadGame('games/New_Game.html')" aria-label="Play Reaction Time Game">
      Reaction Time Game
    </button>

    <button class="game-button" onclick="loadGame('games/breakout.html')" aria-label="Play Breakout Game">
      Breakout
    </button>

    <button class="game-button" onclick="loadGame('games/2048.html')" aria-label="Play 2048 Game">
      2048
    </button>

    <button class="game-button" onclick="loadGame('games/dine_game.html')" aria-label="Play Dino Plus Game">
      Dino Plus
    </button>

    <button class="game-button" onclick="loadGame('games/snake.html')" aria-label="Play Snake Game">
      Snake
    </button>

    <button class="game-button" onclick="loadGame('games/tetris.html')" aria-label="Play Tetris Game">
      Tetris
    </button>

    <button class="game-button" onclick="loadGame('games/flappy_bird.html')" aria-label="Play Flappy Bird Clone">
      Flappy Clone 
    </button>

    <button class="game-button" onclick="loadGame('games/minesweeper.html')" aria-label="Play Minesweeper Game">
      Minesweeper
    </button>

    <button class="game-button" onclick="loadGame('games/tic_tac_toe.html')" aria-label="Play Tic-Tac-Toe Game">
      Tic-Tac-Toe
    </button>

    <button class="game-button" onclick="loadGame('games/rock_paper_scissors.html')" aria-label="Play Rock Paper Scissors Game">
      Rock Paper Scissors
    </button>

    <button class="game-button" onclick="loadGame('games/memory_game.html')" aria-label="Play Memory Game">
      Memory Game
    </button>

    <button class="game-button" onclick="loadGame('games/pong.html')" aria-label="Play Pong Game">
      Pong
    </button>

    <button class="game-button" onclick="loadGame('games/simon_says.html')" aria-label="Play Simon Says Game">
      Simon Says
    </button>

    <button class="game-button" onclick="loadGame('games/whack_a_mole.html')" aria-label="Play Whack-a-Mole Game">
      Whack-a-Mole
    </button>

    <button class="game-button" onclick="loadGame('games/connect_four.html')" aria-label="Play Connect Four Game">
      Connect Four
    </button>

    <button class="game-button" onclick="loadGame('games/frogger.html')" aria-label="Play Frogger Game">
      Frogger
    </button>

    <button class="game-button" onclick="loadGame('games/space_invaders.html')" aria-label="Play Space Invaders Game">
      Space Invaders
    </button>

    <button class="game-button" onclick="loadGame('games/quiz_game.html')" aria-label="Play Quiz Game">
      Quiz Game
    </button>
  </nav>

  <div id="loading">Loading game...</div>
  <!-- back button -->
  <button id="back-button" onclick="backToHub()">Back to Hub</button>

  <!-- iframe for games -->
  <iframe id="gameFrame"></iframe>

  <!-- javascript -->
  <script>
    // search function
    const searchInput = document.getElementById('search');
    const gameNav = document.getElementById('game-nav');
    const buttons = gameNav.querySelectorAll('.game-button');

    searchInput.addEventListener('input', function() {
      const query = this.value.toLowerCase();
      buttons.forEach(button => {
        const text = button.textContent.toLowerCase();
        button.style.display = text.includes(query) ? 'block' : 'none';
      });
    });

    // load game function
    function loadGame(file) {
      const iframe = document.getElementById("gameFrame");
      const loading = document.getElementById("loading");
      const backBtn = document.getElementById("back-button");
      
      loading.style.display = "block";
      iframe.style.display = "none";
      backBtn.style.display = "none";
      
      iframe.src = file;
      iframe.onload = function() {
        loading.style.display = "none";
        iframe.style.display = "block";
        backBtn.style.display = "block";
      };
    }

    // back to hub
    function backToHub() {
      const iframe = document.getElementById("gameFrame");
      const loading = document.getElementById("loading");
      const backBtn = document.getElementById("back-button");
      
      iframe.src = "";
      iframe.style.display = "none";
      loading.style.display = "none";
      backBtn.style.display = "none";
    }
  </script>

  <footer>
    <p>Enjoy these classic games! Built with HTML.</p>
  </footer>

</body>
</html>
