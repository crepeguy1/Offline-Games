<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Game Hub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: white;
      color: black;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: blue;
      font-size: 36px;
    }

    p {
      font-size: 18px;
    }

    body.light-mode {
      background-color: white;
      color: black;
    }

    body.dark-mode {
      background-color: #121212;
      color: #ffffff;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
    }


    #modeToggle {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 10px;
      background-color: gray;
      color: white;
      border: none;
      cursor: pointer;
    }

    .game-button {
      padding: 15px;
      font-size: 16px;
      background-color: lightblue;
      border: 1px solid blue;
      color: black;
      cursor: pointer;
      width: 200px;
    }

    .game-button:hover {
      background-color: blue;
      color: white;
    }

    #search {
      padding: 8px;
      font-size: 14px;
      border: 1px solid black;
      width: 200px;
      margin-bottom: 20px;
    }

    iframe {
      width: 800px;
      height: 500px;
      border: 1px solid black;
      margin-top: 20px;
    }

    #loading {
      display: none;
      margin-top: 20px;
      font-size: 18px;
    }

    #back-button {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background-color: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    footer {
      margin-top: 20px;
      font-size: 14px;
      color: gray;
    }
  </style>
</head>
<body>

  <h1>My Game Hub</h1>
  <p>Click on a game to play it!</p>
  <button class="toggle-btn" id="modeToggle">Toggle Dark Mode</button>

  <!-- i added a search box so you can find games easier -->
  <input type="text" id="search" placeholder="Search games...">

  <!-- all the game buttons go here -->
  <nav id="game-nav">
    <button class="game-button" onclick="loadGame('games/New_Game.html')" aria-label="Play Reaction Time Game">
      Reaction Time Game
    </button>

    <button class="game-button" onclick="loadGame('games/breakout_simple.html')" aria-label="Play Breakout Game">
      Breakout (Simple)
    </button>

    <button class="game-button" onclick="loadGame('games/2048.html')" aria-label="Play 2048 Game">
      2048
    </button>

    <button class="game-button" onclick="loadGame('games/dine_game_simple.html')" aria-label="Play Dino Plus Game">
      Dino Plus (Simple)
    </button>

    <button class="game-button" onclick="loadGame('games/snake_simple.html')" aria-label="Play Snake Game">
      Snake (Simple)
    </button>

    <button class="game-button" onclick="loadGame('games/tetris_simple.html')" aria-label="Play Tetris Game">
      Tetris (Simple)
    </button>

    <button class="game-button" onclick="loadGame('games/flappy_bird_simple.html')" aria-label="Play Flappy Bird Clone">
      Flappy Clone (Simple)
    </button>

    <button class="game-button" onclick="loadGame('games/minesweeper_simple.html')" aria-label="Play Minesweeper Game">
      Minesweeper (Simple)
    </button>

    <button class="game-button" onclick="loadGame('games/tic_tac_toe.html')" aria-label="Play Tic-Tac-Toe Game">
      Tic-Tac-Toe
    </button>

    <button class="game-button" onclick="loadGame('games/rock_paper_scissors.html')" aria-label="Play Rock Paper Scissors Game">
      Rock Paper Scissors
    </button>

    <button class="game-button" onclick="loadGame('games/memory_game.html')" aria-label="Play Memory Game">
      Memory Game
    </button>

    <button class="game-button" onclick="loadGame('games/pong_simple.html')" aria-label="Play Pong Game">
      Pong (Simple)
    </button>

    <button class="game-button" onclick="loadGame('games/simon_says.html')" aria-label="Play Simon Says Game">
      Simon Says
    </button>

    <button class="game-button" onclick="loadGame('games/whack_a_mole.html')" aria-label="Play Whack-a-Mole Game">
      Whack-a-Mole
    </button>

    <button class="game-button" onclick="loadGame('games/connect_four.html')" aria-label="Play Connect Four Game">
      Connect Four
    </button>

    <button class="game-button" onclick="loadGame('games/frogger_simple.html')" aria-label="Play Frogger Game">
      Frogger (Simple)
    </button>

    <button class="game-button" onclick="loadGame('games/space_invaders_simple.html')" aria-label="Play Space Invaders Game">
      Space Invaders (Simple)
    </button>

    <button class="game-button" onclick="loadGame('games/quiz_game.html')" aria-label="Play Quiz Game">
      Quiz Game
    </button>
  </nav>

  <div id="loading">Loading game...</div>
  <!-- back button -->
  <button id="back-button" onclick="backToHub()">Back to Hub</button>

  <!-- iframe for games -->
  <iframe id="gameFrame"></iframe>

  <!-- javascript -->
  <script>
    // this makes the search work - i learned this from w3schools
    const searchInput = document.getElementById('search');
    const gameNav = document.getElementById('game-nav');
    const buttons = gameNav.querySelectorAll('.game-button');

    searchInput.addEventListener('input', function() {
      const query = this.value.toLowerCase();
      buttons.forEach(button => {
        const text = button.textContent.toLowerCase();
        button.style.display = text.includes(query) ? 'block' : 'none';
      });
    });

    const modeToggle = document.getElementById('modeToggle');
    const savedMode = localStorage.getItem('theme');

    if (savedMode) {
      document.body.classList.add(savedMode);
    } else {
      document.body.classList.add('light-mode');
    }

    function updateButtonText() {
      if (document.body.classList.contains('dark-mode')) {
        modeToggle.textContent = 'Switch to Light Mode';
      } else {
        modeToggle.textContent = 'Switch to Dark Mode';
      }
    }

    updateButtonText();

    modeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      document.body.classList.toggle('light-mode');

      if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('theme', 'dark-mode');
      } else {
        localStorage.setItem('theme', 'light-mode');
      }

      updateButtonText();
    });

    // this function loads the games in the iframe - pretty cool huh?
    function loadGame(file) {
      const iframe = document.getElementById("gameFrame");
      const loading = document.getElementById("loading");
      const backBtn = document.getElementById("back-button");
      
      loading.style.display = "block";
      iframe.style.display = "none";
      backBtn.style.display = "none";
      
      iframe.src = file;
      iframe.onload = function() {
        loading.style.display = "none";
        iframe.style.display = "block";
        backBtn.style.display = "block";
      };
    }

    // goes back to the hub - simple but works
    function backToHub() {
      const iframe = document.getElementById("gameFrame");
      const loading = document.getElementById("loading");
      const backBtn = document.getElementById("back-button");
      
      iframe.src = "";
      iframe.style.display = "none";
      loading.style.display = "none";
      backBtn.style.display = "none";
    }
  </script>

  <footer>
    <p>Hope you like my games! I made them all.</p>
  </footer>

</body>
</html>
